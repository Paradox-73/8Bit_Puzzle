# Single entrypoint for the microservices deployment. The browser sees one origin; this routes
# /leaderboard* to the extracted leaderboard service and everything else to the game API.
events {}

http {
    upstream api         { server api:8080; }
    upstream leaderboard { server leaderboard:8080; }

    server {
        listen 8080;

        # Metrics are for internal Prometheus only (which scrapes the services directly),
        # never through the public gateway.
        location /actuator { return 404; }

        # Leaderboard reads -> leaderboard service.
        location /leaderboard {
            proxy_pass http://leaderboard;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;
        }

        # Everything else (auth, puzzles, profile, admin, push, actuator) -> game API.
        location / {
            proxy_pass http://api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;
        }
    }
}
