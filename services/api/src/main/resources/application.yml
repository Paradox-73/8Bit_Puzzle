server:
  # Honour $PORT (Render/most PaaS) or $SERVER_PORT (local), else 8080.
  port: ${PORT:${SERVER_PORT:8080}}
  # Behind a reverse proxy / tunnel in production; tell Spring to trust forwarded headers.
  forward-headers-strategy: framework
  tomcat:
    threads:
      # 200 worker threads is plenty for ~1000 concurrent students making cheap,
      # bursty guess requests. See README "Scalability" section.
      max: 200
      min-spare: 20

spring:
  application:
    name: 8bit-api
  datasource:
    # Default targets the docker-compose published port 5433 (kept off 5432 to avoid clashing
    # with a local Supabase / system Postgres). The api container overrides DB_URL to use the
    # internal 5432. Set DB_URL for Neon/production.
    url: ${DB_URL:jdbc:postgresql://localhost:5433/eightbit}
    username: ${DB_USER:eightbit}
    # No password by default: the local docker-compose Postgres uses trust auth. Set DB_PASSWORD
    # for any real database (Neon/managed Postgres).
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
  jpa:
    hibernate:
      # 'update' keeps dev friction low. For production switch to 'validate' and
      # manage schema with the SQL in the build doc / a migration tool.
      ddl-auto: ${JPA_DDL:update}
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      # Managed Redis (e.g. Upstash) requires TLS. Set REDIS_SSL=true for those; local Redis is plain.
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: 2s
  task:
    scheduling:
      pool:
        size: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    # Don't probe SMTP in the health check — OTP email is optional and may be unconfigured.
    mail:
      enabled: false

app:
  jwt:
    # No secret committed. If unset, the app mints an EPHEMERAL key at startup (dev only).
    # Production MUST set JWT_SECRET to a stable value of >= 32 bytes.
    secret: ${JWT_SECRET:}
    # 30 days so daily players stay logged in across days (token is kept in the browser's
    # localStorage). Requires a stable JWT_SECRET, else a restart invalidates everyone's token.
    access-token-ttl-minutes: ${JWT_TTL_MINUTES:43200}
  cors:
    # Comma-separated allowed origin patterns. "*" is fine because we authenticate with
    # a Bearer token in a header (no cookies), so there is no CSRF surface to protect.
    allowed-origins: ${CORS_ORIGINS:*}
  vapid:
    # Generate a key pair (see README). Leave blank to disable push without errors.
    public-key: ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}
    subject: ${VAPID_SUBJECT:mailto:8bit@iiitb.ac.in}
  content:
    # Editors must keep at least this many days of puzzles queued per game.
    buffer-warn-below-days: 14
  import:
    # One-time importer: publishes the dated puzzles in this file as REAL daily puzzles
    # (status='published', one per day) on startup — fill-if-missing, so admin edits/re-runs never
    # clobber. Gitignored so answers never reach the repo; mount it on the VM (see docker-compose).
    # Set IMPORT_PUZZLES_FILE to an absolute path in prod; resolved against the API's working dir if relative.
    puzzles-file: ${IMPORT_PUZZLES_FILE:puzzles-review.json}
  admin:
    # Master login code for editor/admin accounts: typed in place of the emailed OTP so an admin can
    # always get in without depending on email delivery. Keep it SECRET (gitignored env) — never
    # commit a real value. Empty = disabled (admins use the normal emailed code). Falls back to
    # SEED_EDITOR_PASSWORD for convenience since that env is otherwise unused now.
    login-code: ${ADMIN_LOGIN_CODE:${SEED_EDITOR_PASSWORD:}}
  otp:
    # OFF by default so dev needs no email server. Turn on for launch to require @iiitb.ac.in
    # verification before an account counts toward batch scores.
    enabled: ${OTP_ENABLED:false}
    ttl-minutes: ${OTP_TTL_MINUTES:10}
    # Accepted sign-up domain. The login form locks the field to this domain, so the two MUST agree
    # (createAccount rejects any other domain even when OTP is off). Currently gmail.com. Override
    # with OTP_EMAIL_DOMAIN, or set it blank to allow any domain.
    email-domain: ${OTP_EMAIL_DOMAIN:gmail.com}
    from-address: ${OTP_FROM:8bit@iiitb.ac.in}

  # Cohort sizes for Batch War participation % (distinct solvers ÷ capacity). Program names must
  # match the rollnumber program-map exactly. Capacities are rough estimates: if more verified
  # students than this solve, the bar simply caps at 100% (never errors). Add the 2026 intake
  # here once juniors arrive (16 Jul). Add other years' cohorts as they join.
  batchwar:
    cohorts:
      # 2026 intake (juniors, arrive 16 Jul) — split programmes BC/IC/IE/BA/BE. Capacities below are
      # placeholders mirroring 2025; the denominator auto-grows to the real headcount as they register,
      # so these don't need to be exact. Update once intake numbers are confirmed.
      - { program: "BTech CSE", year: 2026, capacity: 120 }
      - { program: "iMTech CSE", year: 2026, capacity: 30 }
      - { program: "iMTech ECE", year: 2026, capacity: 30 }
      - { program: "BTech AI & DS", year: 2026, capacity: 60 }
      - { program: "BTech ECE", year: 2026, capacity: 30 }
      # 2025 batch — split programmes (granular roll prefixes BC/IC/IE/BA/BE)
      - { program: "BTech CSE", year: 2025, capacity: 120 }     # BC
      - { program: "iMTech CSE", year: 2025, capacity: 30 }     # IC
      - { program: "iMTech ECE", year: 2025, capacity: 30 }     # IE
      - { program: "BTech AI & DS", year: 2025, capacity: 60 }  # BA
      - { program: "BTech ECE", year: 2025, capacity: 30 }      # BE
      # 2024 batch — unified iMTech + BTech (no CSE/ECE split)
      - { program: "iMTech", year: 2024, capacity: 64 }         # IMT
      - { program: "BTech", year: 2024, capacity: 215 }         # BT
      # 2023 & 2022 batches — unified iMTech only (no CSE/ECE split)
      - { program: "iMTech", year: 2023, capacity: 196 }        # IMT
      - { program: "iMTech", year: 2022, capacity: 196 }        # IMT

# SMTP is optional: if spring.mail.host is unset, OTP codes are written to the logs instead of
# emailed (fine for dev). For launch, point these at a free Brevo/Resend SMTP relay via env.
spring.mail:
  host: ${MAIL_HOST:}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  properties:
    mail.smtp.auth: ${MAIL_AUTH:true}
    mail.smtp.starttls.enable: ${MAIL_STARTTLS:true}

rollnumber:
  # Confirm the exact IIITB scheme before launch; this is config-driven so no redeploy needed.
  pattern: "^(IMT|MT|MS|PH|DT|IC|BC|IE|BE|BA|BT)(\\d{4})(\\d{3,4})$"
  program-map:
    IMT: iMTech
    MT: MTech
    MS: MSc
    PH: PhD
    DT: Dual
    IC: iMTech CSE
    BC: BTech CSE
    IE: iMTech ECE
    BE: BTech ECE
    BA: BTech AI & DS
    BT: BTech

logging:
  level:
    com.eightbit: INFO
